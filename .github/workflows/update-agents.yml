name: Update Agents on Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-agents:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Update agents in database
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        echo "🚀 Updating agents in Supabase..."
        node scripts/update-agents-on-deploy.js
        echo "✅ Agents updated successfully!"
        
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
