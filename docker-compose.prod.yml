version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentdb
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: .
    command: ["sh", "-c", "npx drizzle-kit push --yes"]
    environment:
      # Allow overriding DATABASE_URL from the shell when starting compose.
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/agentdb}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/agentdb
      SESSION_SECRET: "replace-with-strong-secret"
      REPL_ID: "local-test"
      ISSUER_URL: "https://replit.com/oidc"
      AI_INTEGRATIONS_OPENAI_API_KEY: ""
      AI_INTEGRATIONS_OPENAI_BASE_URL: ""
      PORT: "5000"
    depends_on:
      - db
    restart: always

volumes:
  db-data:
